<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <script src="./track3.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星级评定业务平台</title>
  <meta name="description" content="星级评定业务平台 - 服务店在线报名与后台管理系统" />

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Element Plus CSS -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app">
    <div class="app-container" v-cloak>
      <!-- 顶部导航栏 -->
      <header class="app-header">
        <div class="header-left">
          <div class="logo-area">
            <div class="logo-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                  fill="currentColor" />
              </svg>
            </div>
            <h1 class="app-title">星级评定业务平台</h1>
          </div>
        </div>
        <div class="header-center" v-if="isAdminMode">
          <nav class="main-nav">
            <button v-for="item in adminNavItems" :key="item.key"
              :class="['nav-btn', { active: currentView === item.key }]" @click="switchView(item.key)">
              <span class="nav-icon" v-html="item.icon"></span>
              <span class="nav-label">{{ item.label }}</span>
            </button>
          </nav>
        </div>
        <div class="header-right">
          <div class="header-status">
            <span :class="['status-dot', registrationOpen ? 'open' : 'closed']"></span>
            <span class="status-text">{{ registrationOpen ? '报名进行中' : '报名已关闭' }}</span>
          </div>
          <el-switch v-if="isAdminMode" v-model="registrationOpen" active-text="开启" inactive-text="关闭"
            style="margin-left: 12px;" @change="onToggleRegistration" />
          <el-button type="primary" plain size="small" style="margin-left: 16px;" @click="toggleSystemMode">
            {{ isAdminMode ? '返回服务店端' : '管理员入口' }}
          </el-button>
        </div>
      </header>

      <!-- 主内容区域 -->
      <!-- 主内容区域 -->
      <main class="app-main">
        <transition name="fade-slide" mode="out-in">
          <registration-form v-if="currentView === 'registration-form'" :registration-open="registrationOpen"
            :registrations="registrations" @submit-registration="handleSubmitRegistration" />
          <admin-review v-else-if="currentView === 'admin-review'" :registrations="registrations"
            @approve="handleApprove" @reject="handleReject" />
          <admin-export v-else-if="currentView === 'admin-export'" :registration-open="registrationOpen"
            :registrations="registrations" @generate-list="handleGenerateList" />
        </transition>
      </main>

      <!-- 底部 -->
      <footer class="app-footer">
        <p>© 2026 星级评定业务平台 · 阶段一 MVP</p>
      </footer>
    </div>
  </div>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js" defer></script>
  <!-- Element Plus -->
  <script src="https://unpkg.com/element-plus" defer></script>
  <!-- Element Plus 中文语言包 -->
  <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js" defer></script>

  <!-- 应用组件 (依赖Vue存在) -->
  <script src="./components/RegistrationForm.js" defer></script>
  <script src="./components/AdminReview.js" defer></script>
  <script src="./components/AdminExport.js" defer></script>
  <!-- 主应用逻辑 -->
  <script src="./app.js" defer></script>
</body>

</html>
